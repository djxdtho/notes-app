<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Notes — AA Elements</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#00d4ff;--accent2:#5b0fbe;--bg:#0a0a0a;--card:rgba(22,22,22,.92);--border:rgba(255,255,255,.06);--text:#f0f0f0;--muted:#666}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
}

/* header */
header{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;margin-bottom:2px;
  background:rgba(10,10,10,.88);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border-bottom:1px solid var(--border);
}
header h1{
  font-size:1.5rem;font-weight:700;letter-spacing:-.03em;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.auth-area{display:flex;align-items:center;gap:10px}
.auth-area .email{font-size:.72rem;color:var(--muted);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.auth-area button{
  padding:5px 14px;border-radius:100px;border:1px solid var(--border);
  background:rgba(255,255,255,.04);color:#aaa;font-size:.72rem;cursor:pointer;
  transition:all .3s;font-family:'Inter',sans-serif;white-space:nowrap;
}
.auth-area button:hover{background:rgba(255,255,255,.08);color:#fff}
.auth-area .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff}

/* screens */
.screen{display:none}
.screen.active{display:block}

/* auth */
#authScreen.active{display:flex;align-items:center;justify-content:center;min-height:90vh}
.auth-card{
  width:100%;max-width:380px;margin:0 16px;
  background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:28px;padding:36px 24px;
  box-shadow:0 32px 80px rgba(0,0,0,.7);
}
.auth-card h2{font-size:1.4rem;font-weight:700;margin-bottom:4px}
.auth-card .sub{font-size:.82rem;color:var(--muted);margin-bottom:22px}
.auth-card input{
  width:100%;padding:12px 16px;border-radius:14px;border:1px solid var(--border);
  background:rgba(255,255,255,.04);color:#fff;font-size:.88rem;outline:none;
  font-family:'Inter',sans-serif;margin-bottom:10px;transition:border-color .3s;
}
.auth-card input:focus{border-color:var(--accent);box-shadow:0 0 24px rgba(0,212,255,.06)}
.auth-card input::placeholder{color:#444}
.auth-card .btn{
  width:100%;padding:12px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  font-family:'Inter',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;
  transition:all .3s;margin-top:2px;
}
.auth-card .btn:hover{transform:scale(1.02);box-shadow:0 8px 30px rgba(0,212,255,.15)}
.divider{display:flex;align-items:center;gap:12px;margin:14px 0;color:#444;font-size:.72rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{
  width:100%;padding:10px;border-radius:14px;border:1px solid var(--border);
  background:rgba(255,255,255,.03);color:#aaa;font-family:'Inter',sans-serif;
  font-size:.8rem;font-weight:500;cursor:pointer;transition:all .3s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-google:hover{background:rgba(255,255,255,.06);color:#fff}
.toggle{text-align:center;margin-top:14px;font-size:.78rem;color:var(--muted)}
.toggle span{color:var(--accent);cursor:pointer}
.auth-error{color:#ef4444;font-size:.78rem;margin-bottom:10px;display:none}
.auth-error.show{display:block}
.notes-error{color:#ef4444;font-size:.78rem;padding:8px 16px;text-align:center;display:none}
.notes-error.show{display:block}

/* notes list */
.notes-count{font-size:.72rem;color:var(--muted);padding:12px 20px 6px;font-weight:500}
.notes-list{padding:0 12px 100px}
.note-card{
  display:flex;flex-direction:column;
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:14px 16px;margin-bottom:8px;
  cursor:pointer;transition:all .35s cubic-bezier(.22,1,.36,1);
  position:relative;
}
.note-card:active{transform:scale(.98)}
.note-card .note-title{
  font-size:.88rem;font-weight:600;color:#fff;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:70px;
}
.note-card .note-preview{
  font-size:.78rem;color:var(--muted);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  padding-right:70px;
}
.note-card .note-meta{
  position:absolute;top:14px;right:16px;
  font-size:.65rem;color:#444;font-weight:500;
}
.note-card .delete-btn{
  position:absolute;bottom:14px;right:16px;
  width:24px;height:24px;border-radius:8px;border:1px solid transparent;
  background:transparent;color:#333;cursor:pointer;font-size:.6rem;
  transition:all .3s;display:flex;align-items:center;justify-content:center;
}
.note-card:hover .delete-btn{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.12);color:#ef4444}
.note-card .char-count{
  font-size:.6rem;color:#333;margin-top:4px;
}

/* compose button */
.compose-btn{
  position:fixed;bottom:28px;right:28px;z-index:60;
  width:56px;height:56px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  font-size:1.8rem;font-weight:300;cursor:pointer;
  box-shadow:0 8px 32px rgba(0,212,255,.25);
  transition:all .3s cubic-bezier(.22,1,.36,1);
  display:flex;align-items:center;justify-content:center;
}
.compose-btn:hover{transform:scale(1.08);box-shadow:0 12px 40px rgba(0,212,255,.35)}
.compose-btn:active{transform:scale(.92)}

/* empty */
.empty-notes{text-align:center;padding:80px 20px}
.empty-notes .icon{font-size:3rem;margin-bottom:12px;opacity:.15}
.empty-notes h3{font-size:1rem;color:#555;font-weight:600;margin-bottom:4px}
.empty-notes p{font-size:.8rem;color:#333}

/* loading */
.loading{text-align:center;padding:40px 0;color:#444;font-size:.8rem}

/* modal */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:flex-end;justify-content:center;
  animation:fadeIn .3s ease;
}
.modal-overlay.active{display:flex}
.modal-overlay.active .modal-sheet{animation:slideUp .4s cubic-bezier(.22,1,.36,1)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.modal-sheet{
  width:100%;max-width:520px;max-height:92vh;
  background:var(--card);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border-radius:24px 24px 0 0;padding:20px 20px 32px;
  box-shadow:0 -8px 60px rgba(0,0,0,.6);
  display:flex;flex-direction:column;
  position:relative;
}
.modal-handle{
  width:36px;height:4px;border-radius:4px;background:rgba(255,255,255,.1);
  margin:0 auto 16px;
}
.modal-sheet .modal-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
}
.modal-sheet .modal-header button{
  padding:6px 16px;border-radius:100px;border:none;
  font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .3s;
}
.modal-sheet .modal-header .cancel-btn{background:rgba(255,255,255,.06);color:#888}
.modal-sheet .modal-header .cancel-btn:hover{background:rgba(255,255,255,.1)}
.modal-sheet .modal-header .save-btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  padding:6px 20px;
}
.modal-sheet .modal-header .save-btn:hover{box-shadow:0 4px 20px rgba(0,212,255,.2)}
.modal-sheet textarea{
  width:100%;flex:1;min-height:200px;max-height:65vh;
  background:transparent;border:none;color:#fff;
  font-family:'Inter',sans-serif;font-size:.95rem;line-height:1.7;
  outline:none;resize:none;padding:4px 0;
}
.modal-sheet textarea::placeholder{color:#333}

/* sign out */
.sign-out-btn:hover{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.15);color:#ef4444}

/* responsive */
@media(max-width:480px){
  header{padding:12px 16px}
  header h1{font-size:1.3rem}
  .compose-btn{width:52px;height:52px;font-size:1.6rem;bottom:20px;right:20px}
  .note-card{padding:12px 14px}
  .modal-sheet{padding:16px 16px 28px;border-radius:20px 20px 0 0}
}
</style>
</head>
<body>

<header>
  <h1>Notes</h1>
  <div class="auth-area">
    <span class="email" id="userEmail"></span>
    <button class="btn-primary" id="showAuthBtn" style="display:none">Sign In</button>
    <button class="sign-out-btn" id="signOutBtn" style="display:none">Sign Out</button>
  </div>
</header>

<!-- Auth -->
<div class="screen active" id="authScreen">
  <div class="auth-card">
    <h2 id="authTitle">Sign In</h2>
    <p class="sub" id="authSub">Access your notes anywhere.</p>
    <div class="auth-error" id="authError"></div>
    <input type="email" id="authEmail" placeholder="Email">
    <input type="password" id="authPassword" placeholder="Password">
    <button class="btn" id="authBtn">Sign In</button>
    <div class="divider"><span>or</span></div>
    <button class="btn-google" id="googleBtn"><svg viewBox="0 0 48 48" width="18" height="18"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.98-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg> Continue with Google</button>
    <div class="toggle">Don't have an account? <span id="authToggle">Create one</span></div>
  </div>
</div>

<!-- Notes -->
<div class="screen" id="notesScreen">
  <div class="notes-count" id="notesCount"></div>
  <div class="notes-error" id="notesError"></div>
  <div class="notes-list" id="notesList"></div>
  <div class="empty-notes" id="emptyNotes">
    <div class="icon">📝</div>
    <h3>No Notes Yet</h3>
    <p>Tap + to write your first note.</p>
  </div>
  <button class="compose-btn" id="composeBtn">+</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <button class="cancel-btn" id="modalCancel">Cancel</button>
      <button class="save-btn" id="modalSave">Save</button>
    </div>
    <textarea id="modalText" placeholder="Write something..."></textarea>
  </div>
</div>

<footer style="text-align:center;padding:20px;font-size:.65rem;color:#222">Notes by AA Elements</footer>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDOZvxIIkUicNcewpG1vGUxiBfB1pkOv3w",
  authDomain: "notesapp-fab8a.firebaseapp.com",
  projectId: "notesapp-fab8a",
  storageBucket: "notesapp-fab8a.firebasestorage.app",
  messagingSenderId: "726301601867",
  appId: "1:726301601867:web:473ac05cd423707b779dce",
  measurementId: "G-BN2TF8ZJDM"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

const authScreen=document.getElementById('authScreen');
const notesScreen=document.getElementById('notesScreen');
const authTitle=document.getElementById('authTitle');
const authSub=document.getElementById('authSub');
const authEmail=document.getElementById('authEmail');
const authPassword=document.getElementById('authPassword');
const authBtn=document.getElementById('authBtn');
const authToggle=document.getElementById('authToggle');
const authError=document.getElementById('authError');
const showAuthBtn=document.getElementById('showAuthBtn');
const signOutBtn=document.getElementById('signOutBtn');
const userEmail=document.getElementById('userEmail');
const notesList=document.getElementById('notesList');
const notesCount=document.getElementById('notesCount');
const notesError=document.getElementById('notesError');
const emptyNotes=document.getElementById('emptyNotes');
const composeBtn=document.getElementById('composeBtn');
const modalOverlay=document.getElementById('modalOverlay');
const modalText=document.getElementById('modalText');
const modalSave=document.getElementById('modalSave');
const modalCancel=document.getElementById('modalCancel');

let isSignUp=false;
let currentUser=null;
let unsubscribe=null;
let editingId=null;

function showError(msg){authError.textContent=msg;authError.classList.add('show')}
function hideError(){authError.classList.remove('show')}
function showNotesError(msg){notesError.textContent=msg;notesError.classList.add('show');setTimeout(()=>notesError.classList.remove('show'),5000)}

authToggle.addEventListener('click',()=>{
  isSignUp=!isSignUp;
  authTitle.textContent=isSignUp?'Create Account':'Sign In';
  authSub.textContent=isSignUp?'Create an account to save notes.':'Access your notes anywhere.';
  authBtn.textContent=isSignUp?'Create Account':'Sign In';
  authToggle.textContent=isSignUp?'Sign in':'Create one';
  hideError();
});

document.getElementById('googleBtn').addEventListener('click',async()=>{
  const provider=new firebase.auth.GoogleAuthProvider();
  try{await auth.signInWithPopup(provider)}catch(e){showError(e.message.replace('Firebase: ','').replace(/\(.*\)/,'').trim())}
});

authBtn.addEventListener('click',async()=>{
  const email=authEmail.value.trim(),pass=authPassword.value.trim();
  if(!email||!pass)return showError('Fill in all fields.');
  if(pass.length<6)return showError('Password must be at least 6 characters.');
  hideError();authBtn.disabled=true;authBtn.textContent='Loading...';
  try{
    if(isSignUp) await auth.createUserWithEmailAndPassword(email,pass);
    else await auth.signInWithEmailAndPassword(email,pass);
  }catch(e){
    showError(e.message.replace('Firebase: ','').replace(/\(.*\)/,'').trim());
    authBtn.disabled=false;authBtn.textContent=isSignUp?'Create Account':'Sign In';
  }
});

showAuthBtn.addEventListener('click',()=>{authScreen.classList.add('active');notesScreen.classList.remove('active');showAuthBtn.style.display='none'});
signOutBtn.addEventListener('click',()=>auth.signOut());

auth.onAuthStateChanged(user=>{
  authBtn.disabled=false;authBtn.textContent=isSignUp?'Create Account':'Sign In';
  if(user){
    currentUser=user;authScreen.classList.remove('active');notesScreen.classList.add('active');
    showAuthBtn.style.display='none';signOutBtn.style.display='';
    userEmail.textContent=user.email;authEmail.value='';authPassword.value='';hideError();loadNotes();
  }else{
    currentUser=null;unsubscribe&&unsubscribe();unsubscribe=null;
    authScreen.classList.add('active');notesScreen.classList.remove('active');
    showAuthBtn.style.display='';signOutBtn.style.display='none';
    userEmail.textContent='';notesList.innerHTML='';emptyNotes.style.display='block';notesCount.textContent='';
  }
});

function loadNotes(){
  if(!currentUser)return;
  notesList.innerHTML='<div class="loading">Loading...</div>';emptyNotes.style.display='none';
  unsubscribe=db.collection('notes').where('uid','==',currentUser.uid).orderBy('createdAt','desc')
    .onSnapshot(snap=>{
      notesList.innerHTML='';
      if(snap.empty){emptyNotes.style.display='block';notesCount.textContent='';return}
      emptyNotes.style.display='none';
      notesCount.textContent=`${snap.size} ${snap.size===1?'note':'notes'}`;
      snap.forEach(doc=>{const d=doc.data();appendNote(doc.id,d.text,d.createdAt?.toDate()||new Date())});
    },()=>{notesList.innerHTML='<div class="loading" style="color:#ef4444">Failed to load notes.</div>'});
}

function appendNote(id,text,date){
  const div=document.createElement('div');div.className='note-card';div.dataset.id=id;
  const lines=text.split('\n');
  const title=lines[0].trim()||'Untitled';
  const preview=lines.slice(1).join(' ').trim().slice(0,120)||lines[0].trim().slice(0,120);
  const timeStr=date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const charCount=text.length;
  div.innerHTML=`
    <div class="note-title">${escapeHtml(title)}</div>
    ${preview?`<div class="note-preview">${escapeHtml(preview)}</div>`:''}
    <div class="note-meta">${timeStr}</div>
    <button class="delete-btn" onclick="event.stopPropagation();deleteNote('${id}')">✕</button>
    <div class="char-count">${charCount} characters</div>`;
  div.addEventListener('click',()=>openNote(id,text));
  notesList.appendChild(div);
}

function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

composeBtn.addEventListener('click',()=>{editingId=null;modalText.value='';modalOverlay.classList.add('active');setTimeout(()=>modalText.focus(),300)});
modalCancel.addEventListener('click',closeModal);
modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay)closeModal()});

function closeModal(){modalOverlay.classList.remove('active');modalText.value='';editingId=null}

modalSave.addEventListener('click',async()=>{
  const text=modalText.value.trim();
  if(!text||!currentUser)return;
  modalSave.disabled=true;modalSave.textContent='Saving...';
  try{
    if(editingId){
      await db.collection('notes').doc(editingId).update({text});
    }else{
      await db.collection('notes').add({uid:currentUser.uid,text,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }
    closeModal();
  }catch(e){showNotesError(e.message)}
  modalSave.disabled=false;modalSave.textContent='Save';
});

function openNote(id,text){editingId=id;modalText.value=text;modalOverlay.classList.add('active');setTimeout(()=>modalText.focus(),300)}

async function deleteNote(id){
  if(!confirm('Delete this note?'))return;
  try{await db.collection('notes').doc(id).delete()}catch(e){console.error(e)}
}

modalText.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.metaKey)modalSave.click()});
</script>
</body>
</html>
